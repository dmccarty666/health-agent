<!DOCTYPE html>
<html>
<head>
<title>Body Map Region Debug</title>
<style>
  body { background: #1a1a2e; color: #eee; font-family: monospace; padding: 20px; }
  .container { display: flex; gap: 20px; }
  .image-wrap { position: relative; display: inline-block; }
  .body-img { display: block; width: 540px; height: auto; }
  .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  .region { fill: rgba(255,255,255,0.1); stroke-width: 1.5; vector-effect: non-scaling-stroke; }
  .region-label { fill: #fff; font-size: 9px; font-family: monospace; text-anchor: middle; pointer-events: none; }
  .grid line { stroke: rgba(255,255,255,0.1); stroke-width: 0.5; }
  .grid text { fill: #888; font-size: 8px; font-family: monospace; }
  .legend { background: #0a0a1a; padding: 10px; border-radius: 4px; font-size: 11px; max-width: 300px; }
  .legend .region-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
  .legend .swatch { width: 12px; height: 12px; border-radius: 2px; }
</style>
</head>
<body>
<h2>Body Map Region Debug Overlay</h2>
<p>Image is 270x360. The grid is at 30px (10% of width/height). Each region is drawn with a colored outline + label at its centroid.</p>
<div class="container">
  <div class="image-wrap">
    <img class="body-img" src="http://localhost:8080/img/body/anatomical.jpg" id="bodyImg" />
    <svg class="overlay" id="overlay" viewBox="0 0 270 360" preserveAspectRatio="xMidYMin meet">
      <g class="grid" id="grid"></g>
      <g id="regions"></g>
    </svg>
  </div>
  <div class="legend" id="legend"></div>
</div>

<script>
  const REGIONS = {
    head:              { color: '#ff5555', poly: [[117, 13], [146, 13], [146, 56], [117, 56]] },
    'left-shoulder':   { color: '#55ff55', poly: [[81, 63], [101, 63], [101, 93], [81, 93]] },
    'right-shoulder':  { color: '#55ff55', poly: [[161, 65], [175, 65], [175, 91], [161, 91]] },
    chest:             { color: '#5555ff', poly: [[105, 64], [159, 64], [159, 110], [105, 110]] },
    stomach:           { color: '#ffff55', poly: [[105, 113], [160, 113], [160, 157], [105, 157]] },
    'left-arm':        { color: '#ff55ff', poly: [[71, 98], [102, 98], [102, 167], [71, 167]] },
    'right-arm':       { color: '#ff55ff', poly: [[162, 92], [187, 92], [187, 162], [162, 162]] },
    'left-hand':       { color: '#55ffff', poly: [[60, 180], [100, 180], [100, 205], [60, 205]] },
    'right-hand':      { color: '#55ffff', poly: [[170, 180], [210, 180], [210, 205], [170, 205]] },
    'left-leg':        { color: '#ffaa00', poly: [[98, 176], [130, 176], [130, 324], [98, 324]] },
    'right-leg':       { color: '#ffaa00', poly: [[135, 182], [163, 182], [163, 322], [135, 322]] },
    'left-foot':       { color: '#aa00ff', poly: [[100, 336], [130, 336], [130, 345], [100, 345]] },
    'right-foot':      { color: '#aa00ff', poly: [[130, 336], [160, 336], [160, 345], [130, 345]] }
  };

  // Draw grid
  const grid = document.getElementById('grid');
  for (let x = 0; x <= 270; x += 30) {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x); line.setAttribute('x2', x);
    line.setAttribute('y1', 0); line.setAttribute('y2', 360);
    grid.appendChild(line);
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', x + 1); text.setAttribute('y', 8);
    text.textContent = x;
    grid.appendChild(text);
  }
  for (let y = 0; y <= 360; y += 30) {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', 0); line.setAttribute('x2', 270);
    line.setAttribute('y1', y); line.setAttribute('y2', y);
    grid.appendChild(line);
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', 1); text.setAttribute('y', y - 1);
    text.textContent = y;
    grid.appendChild(text);
  }

  // Draw regions
  const regions = document.getElementById('regions');
  const legend = document.getElementById('legend');
  for (const [name, info] of Object.entries(REGIONS)) {
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', info.poly.map(p => p.join(',')).join(' '));
    poly.setAttribute('class', 'region');
    poly.setAttribute('fill', info.color + '44');
    poly.setAttribute('stroke', info.color);
    poly.setAttribute('stroke-width', '1.5');
    regions.appendChild(poly);

    // Centroid
    const cx = info.poly.reduce((s, p) => s + p[0], 0) / info.poly.length;
    const cy = info.poly.reduce((s, p) => s + p[1], 0) / info.poly.length;
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', cx); label.setAttribute('y', cy + 2);
    label.setAttribute('class', 'region-label');
    label.textContent = name;
    regions.appendChild(label);

    // Legend row
    const row = document.createElement('div');
    row.className = 'region-row';
    row.innerHTML = `<span class="swatch" style="background:${info.color}"></span> ${name}: (${info.poly.length} pts, center ${Math.round(cx)},${Math.round(cy)})`;
    legend.appendChild(row);
  }
</script>
</body>
</html>
