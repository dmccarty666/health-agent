# Reference project.yaml for the existing hermes-memory project.
#
# This file is canon: when bootstrap.sh renders SOULs from templates using
# THIS file as input, the result should be byte-identical (modulo whitespace
# / template-controlled comments) to the hand-written SOULs currently
# installed in ~/.hermes/PROJECTS/hermes-memory/souls/.
#
# That equivalence is our regression test for the templates.

project:
  slug: hm
  dir_name: hermes-memory       # <-- new: actual directory name under ~/.hermes/PROJECTS/, may differ from slug
  name: "Hermes Memory"
  domain: "local-first conversation memory plugin for Hermes Agent"
  description: |
    Replace Hermes's holographic fact_store with a local-first, source-traceable
    memory subsystem (hermes-local plugin). Provides redaction at write time,
    keyword + semantic + hybrid retrieval, recent context, narrative thread on
    /new, and nightly dream summarization, with full backup + rebuild support.
  primary_language: python
  test_command: "scripts/run_tests.sh tests/integration/memory/"
  build_command: ""

phases:
  count: 6
  acceptance_test_section: "§9"
  planning_task_title_pattern: "T-PLAN-PHASE-{phase}: Decompose Phase {phase} of hermes-memory"

goal:
  headline: |
    Land the hermes-memory MVP — Plan.md Phases 1 through 6 — with the MVP
    acceptance test suite green.
  out_of_scope:
    - "Mem0 OSS integration (post-MVP per PROJECT.md §3.2)"
    - "Graph memory (post-MVP)"
    - "Web dashboard (post-MVP)"
    - "Cross-agent memory bus for OpenClaw / Agent Zero (post-MVP)"
    - "Document / transcript ingestion (post-MVP)"
    - "LLM-based contradiction detection (heuristic v1 is the MVP target)"
    - "Memory review queue UI (post-MVP)"
    - "Hermes core changes beyond what ADR-001 authorizes"
  hard_constraints:
    - "Schema independence: zero direct queries into hermes_state.db or memory_store.db schemas"
    - "No remote push: all commits stay local on the hermes-agent feature branches"
    - "Real services in tests: no internal-module mocking; real Qdrant @ :6333, LMS @ :1235, SQLite tmp_path"
    - "Redaction is Phase 1: all secrets blocked at write time, fixture-tested before any other Phase 1 code lands"
    - "force_no_redact removed: the argument must not appear anywhere in code"
  acceptance_scenarios_pass:
    - A   # Lossless Capture
    - B   # Redaction
    - C   # Keyword Search
    - D   # Semantic Search
    - E   # Hybrid Retrieval
    - F   # Recent Context
    - G   # Narrative Thread
    - H   # /new continuity
    - I   # Migration
    - J   # /new + prior session
    - K   # Backup + Rebuild
    - L   # MVP suite green

escalation:
  channel: telegram
  contact: David
  cooldown_hours: 24
  notify_on:
    - review_required_24h
    - adr_needed
    - worker_reclaimed_twice
    - hallucination_warning
    - state_drift
    - phase_gate_failed
    - goal_achieved
    - stale_lock_5h
    - stale_qa_block

orchestrator:
  cron_schedule: "*/30 * * * *"
  heartbeat_cooldown_minutes: 10
  max_actions_per_tick: 3
  hard_timeout_seconds: 900

models:
  orchestrator:
    provider: openrouter
    model: "minimax/minimax-m2.7"
  planner:
    provider: openrouter
    model: "minimax/minimax-m2.7"
  architect:
    provider: openrouter
    model: "nvidia/nemotron-3-super-120b-a12b"
  developer:
    provider: openai-codex
    model: "gpt-5.4"
  qa:
    provider: openrouter
    model: "minimax/minimax-m2.7"
  docs:
    provider: openrouter
    model: "moonshotai/kimi-k2"
  auditor:
    provider: openrouter
    model: "moonshotai/kimi-k2"

skills:
  orchestrator:
    - kanban-orchestrator
  planner:
    - kanban-worker
    - writing-plans
  architect:
    - kanban-worker
    - writing-plans
  developer:
    - kanban-worker
    - test-driven-development
    - systematic-debugging
    - github-pr-workflow
  qa:
    - kanban-worker
    - requesting-code-review
    - systematic-debugging
  docs:
    - kanban-worker
  auditor:
    - kanban-worker

paths:
  source_root: "~/.hermes/hermes-agent/plugins/memory/hermes-local"
  test_root: "~/.hermes/hermes-agent/tests/integration/memory"
  docs_root: "docs/"
  adr_root: "docs/adr/"
  sibling_projects:
    - label: "holographic plugin (read-only reference)"
      path: "~/.hermes/hermes-agent/plugins/memory/holographic"
      access: read-only
    - label: "hermes-agent core (read-only API surface)"
      path: "~/.hermes/hermes-agent"
      access: read-only

guardrails:
  developer:
    - "NEVER touch holographic's memory_store.db schema or hermes_state.db schema directly. Schema independence is non-negotiable (TDD §6, NFR-011). Only access Hermes core via public helpers (get_hermes_home, apply_wal_with_fallback, the MemoryProvider ABC)."
    - "NEVER skip redaction tests on capture-path work. Phase 1 redaction is the foundation. Any code touching sync_turn, capture_event, or JSONL/SQLite write paths MUST have fixture-secret tests covering AWS keys, GitHub tokens, OpenAI keys (sk-...), Anthropic keys, SSN, Luhn cards, private keys."
    - "NEVER auto-complete schema, migration, narrative-thread, or redaction work. End those with kanban_block(reason='review-required: <one-line>') instead."
    - "NEVER reintroduce force_no_redact in any form. The argument was removed by ADR-001."
  qa:
    - "NEVER approve a card whose tests stub out internal hermes-local modules. Real services only — Qdrant @ :6333, LMS @ :1235, SQLite via tmp_path."
    - "NEVER approve a card whose changes touch holographic schema files."
    - "NEVER approve a phase gate without independent verification of redaction guarantees by hm-auditor."

inputs:
  project_md: PROJECT.md
  prd_md: prd.md
  tdd_md: TDD.md
  plan_md: Plan.md
  epics_md: EPICS.md
  tasklist_md: TASKLIST.md
